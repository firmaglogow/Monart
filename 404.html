<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Strona nie istnieje</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2eb;
        --ink: #172019;
        --muted: #6f756d;
        --line: rgba(23, 32, 25, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      main {
        width: min(520px, 100%);
        padding: 42px 28px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.74);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 6vw, 2.6rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Strona nie istnieje</h1>
      <p>Podany adres jest nieprawidłowy albo strona została przeniesiona.</p>
    </main>
  </body>
</html>
